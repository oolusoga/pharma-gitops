apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    env: dev
    managed-by: terraform
  name: pharma-deployer-binding
  namespace: dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pharma-deployer
subjects:
- kind: ServiceAccount
  name: gitlab-runner
  namespace: gitlab-runner
